<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root {
  --d: #131314;       /* Deepest background */
  --s: #1e1f20;       /* Sidebar background */
  --m: #131314;       /* Main chat background */
  --p: #1e1f20;       /* Panels/Bubbles */
  --h: #2a2b2d;       /* Hover states */
  --i: #282a2c;       /* User message bubble */
  --t1: #f2f2f2;      /* Primary text */
  --t2: #c4c7c5;      /* Secondary text */
  --tm: #80868b;      /* Muted text */
  --ac: #1a73e8;      /* Gemini Blue accent */
  --acg: rgba(26, 115, 232, 0.15);
  --bd: rgba(255, 255, 255, 0.08);
  --cb: #0f0f10;      /* Code block bg */
  --gr: #34a853;      /* Success green */
  --f: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mo: 'SF Mono', 'Fira Code', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 4px; }

@keyframes mIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes wIn { from { opacity: 0; transform: translateY(16px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes td { 0%, 80%, 100% { transform: translateY(0); opacity: .35; } 40% { transform: translateY(-5px); opacity: 1; } }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
@keyframes pulseGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

.app { display: flex; height: 100vh; font-family: var(--f); font-size: 14px; color: var(--t1); background: var(--m); overflow: hidden; position: relative; }
.sb { width: 260px; min-width: 260px; background: var(--s); display: flex; flex-direction: column; border-right: 1px solid var(--bd); overflow: hidden; transition: width .25s ease, min-width .25s ease, opacity .2s ease; }
.sb.off { width: 0; min-width: 0; opacity: 0; }
.sb-top { padding: 16px 14px 10px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }

.logo { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; font-weight: 600; color: var(--t1); letter-spacing: -0.2px; }
.ls { width: 28px; height: 28px; background: linear-gradient(135deg, #4285f4, #9b51e0); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; animation: pulseGlow 3s ease-in-out infinite; }
.ib { width: 32px; height: 32px; background: none; border: none; color: var(--t2); cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all .15s; font-size: 18px; margin: 0 auto; }
.ib:hover { background: var(--h); color: var(--t1); }
.hl .ib, .hr .ib { margin: 0; } /* Keep header actions tight */

.nc { margin: 8px 14px; padding: 10px 14px; background: var(--h); border: 1px solid var(--bd); border-radius: 24px; color: var(--t1); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .15s; width: calc(100% - 28px); text-align: center; font-family: var(--f); }
.nc:hover { background: var(--acg); border-color: var(--ac); }
.srch { margin: 4px 14px; padding: 8px 12px; background: var(--d); border: 1px solid var(--bd); border-radius: 8px; color: var(--t1); font-size: 12px; outline: none; width: calc(100% - 28px); transition: border-color .15s; font-family: var(--f); text-align: center; }
.srch::placeholder { color: var(--tm); text-align: center; }
.srch:focus { border-color: var(--ac); }

.cl { flex: 1; overflow-y: auto; padding: 8px 10px; }
.slbl { font-size: 11px; font-weight: 700; color: var(--tm); text-transform: uppercase; letter-spacing: .8px; padding: 12px 12px 6px; text-align: left; }
.cv { padding: 9px 12px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all .12s; position: relative; min-height: 38px; justify-content: flex-start; }
.cv:hover { background: var(--h); }
.cv.on { background: var(--d); }
.cv.on::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 40%; background: var(--ac); border-radius: 0 4px 4px 0; }
.ct { font-size: 12px; color: var(--t2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.cv.on .ct { color: var(--t1); font-weight: 500; }

/* Custom System Prompt Area inside Sidebar */
.sp-box { margin: 10px 14px; padding: 10px; background: rgba(255,255,255,0.02); border: 1px dashed var(--bd); border-radius: 12px; }
.sp-box summary { font-size: 11px; color: var(--tm); cursor: pointer; user-select: none; font-weight: 600; outline: none; text-align: center; }
.sp-box summary:hover { color: var(--t2); }
.sp-ta { width: 100%; height: 70px; background: var(--d); border: 1px solid var(--bd); border-radius: 6px; margin-top: 8px; padding: 6px; color: var(--t2); font-size: 11px; font-family: var(--f); resize: none; outline: none; }
.sp-ta:focus { border-color: var(--ac); }

.sbf { padding: 12px 14px; border-top: 1px solid var(--bd); flex-shrink: 0; }
.ur { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 12px; cursor: pointer; transition: background .15s; justify-content: center; }
.ur:hover { background: var(--h); }
.av { width: 28px; height: 28px; background: #5f6368; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.un { font-size: 13px; font-weight: 500; flex: 1; text-align: left; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--m); min-width: 0; }
.hdr { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--bd); flex-shrink: 0; min-height: 56px; }
.hl { display: flex; align-items: center; gap: 12px; }
.ms { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--p); border: 1px solid var(--bd); border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--t1); transition: all .15s; position: relative; font-family: var(--f); }
.ms:hover { background: var(--h); border-color: var(--ac); }
.md { width: 7px; height: 7px; background: var(--gr); border-radius: 50%; animation: pulseGlow 2s infinite; flex-shrink: 0; }
.mdd { position: absolute; top: calc(100% + 6px); left: 0; min-width: 180px; background: var(--p); border: 1px solid var(--bd); border-radius: 12px; padding: 6px; box-shadow: 0 8px 32px rgba(0,0,0,.5); z-index: 50; display: none; animation: di .15s ease; }
.mdd.op { display: block; }
.mo { padding: 8px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 12px; transition: background .1s; }
.mo:hover { background: var(--h); }
.mo.cur { color: var(--ac); font-weight: 500; }
.bg { font-size: 10px; font-weight: 700; background: var(--ac); color: #fff; padding: 2px 6px; border-radius: 4px; }
.hr { display: flex; align-items: center; gap: 8px; }

.msgs { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.mi { max-width: 760px; width: 100%; margin: 0 auto; padding: 24px 24px 0; display: flex; flex-direction: column; flex: 1; }
.wlc { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; animation: wIn .45s ease; padding: 24px 0; }
.wi { font-size: 42px; margin-bottom: 16px; background: linear-gradient(135deg, #4285f4, #a142f4, #e84135); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
.wlc h1 { font-size: 24px; font-weight: 500; letter-spacing: -0.4px; margin-bottom: 8px; color: var(--t1); }
.wlc p { font-size: 14px; color: var(--t2); max-width: 360px; line-height: 1.6; margin-bottom: 28px; }
.suggs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 520px; }
.sg { background: var(--p); border: 1px solid var(--bd); border-radius: 14px; padding: 14px; cursor: pointer; text-align: left; transition: all .15s; display: flex; flex-direction: column; justify-content: center; }
.sg:hover { background: var(--h); border-color: var(--ac); transform: translateY(-1px); }
.si { font-size: 18px; margin-bottom: 6px; align-self: flex-start; }
.st { font-size: 13px; font-weight: 600; color: var(--t1); }
.ss { font-size: 11px; color: var(--tm); margin-top: 2px; }

.msg { display: flex; flex-direction: column; margin-bottom: 16px; animation: mIn .22s cubic-bezier(.16,1,.3,1); width: 100%; }
.msg.user { align-items: flex-end; }
.msg.assistant { align-items: flex-start; }
.mr { display: flex; align-items: flex-start; gap: 12px; width: 100%; }
.msg.user .mr { flex-direction: row-reverse; max-width: 85%; }
.msg.assistant .mr { max-width: 100%; }
.mav { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; margin-top: 2px; }
.msg.user .mav { background: var(--ac); color: #fff; }
.msg.assistant .mav { background: linear-gradient(135deg, #4285f4, #9b51e0); color: #fff; font-size: 11px; }
.mb { flex: 1; min-width: 0; }
.bbl { padding: 10px 16px; border-radius: 16px; font-size: 14.5px; line-height: 1.65; }
.msg.user .bbl { background: var(--i); border: 1px solid var(--bd); border-radius: 18px 4px 18px 18px; color: var(--t1); }
.msg.assistant .bbl { background: transparent; padding: 6px 0; color: var(--t1); }
.bbl p { margin-bottom: 10px; }
.bbl p:last-child { margin-bottom: 0; }
.bbl h1 { font-size: 20px; font-weight: 600; margin: 16px 0 8px; }
.bbl h2 { font-size: 16px; font-weight: 600; margin: 14px 0 6px; }
.bbl h3 { font-size: 14px; font-weight: 600; margin: 12px 0 4px; }
.bbl ul, .bbl ol { margin: 8px 0; padding-left: 20px; }
.bbl li { margin: 4px 0; }
.bbl code { font-family: var(--mo); font-size: 12px; background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; color: #ecf0f1; }
.bbl pre { background: var(--cb); border: 1px solid var(--bd); border-radius: 12px; overflow: hidden; margin: 12px 0; }
.ch { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; background: rgba(255,255,255,.03); border-bottom: 1px solid var(--bd); }
.cl2 { font-size: 11px; font-weight: 700; color: var(--tm); text-transform: uppercase; font-family: var(--mo); }
.cc { background: none; border: 1px solid var(--bd); color: var(--t2); font-size: 11px; padding: 3px 9px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all .15s; font-family: var(--f); }
.cc:hover { background: var(--h); color: var(--t1); border-color: var(--ac); }
.bbl pre code { display: block; padding: 14px; overflow-x: auto; background: none; border: none; font-size: 12.5px; line-height: 1.6; color: #e3e3e3; white-space: pre; }
.bbl blockquote { border-left: 3px solid var(--ac); padding-left: 14px; margin: 8px 0; color: var(--t2); font-style: italic; }
.bbl a { color: var(--ac); text-decoration: none; }
.bbl a:hover { text-decoration: underline; }

.acts { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 4px; opacity: 0; transition: opacity .2s; padding-left: 42px; width: max-content; }
.msg:hover .acts { opacity: 1; }
.msg.user .acts { padding-left: 0; justify-content: flex-end; padding-right: 42px; width: 100%; }
.ab { width: 28px; height: 28px; background: none; border: none; color: var(--tm); cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all .12s; font-size: 14px; }
.ab:hover { background: var(--h); color: var(--t2); }

.typing { display: flex; align-items: center; gap: 12px; padding: 8px 0; margin-bottom: 16px; animation: mIn .2s ease; }
.tav { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #4285f4, #9b51e0); display: flex; align-items: center; justify-content: center; font-size: 11px; color:#fff; flex-shrink: 0; }
.tdots { display: flex; gap: 5px; padding: 10px 14px; background: var(--p); border-radius: 14px; border: 1px solid var(--bd); justify-content: center; align-items: center; }
.d { width: 6px; height: 6px; background: var(--ac); border-radius: 50%; animation: td 1.4s infinite ease-in-out; }
.d:nth-child(2) { animation-delay: .2s; }
.d:nth-child(3) { animation-delay: .4s; }
.cur { display: inline-block; width: 2px; height: 1em; background: var(--ac); margin-left: 2px; vertical-align: text-bottom; animation: blink .7s infinite; }
.err { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); border-radius: 12px; font-size: 13px; color: #f87171; margin-bottom: 16px; animation: mIn .2s ease; justify-content: center; }

.ia { padding: 12px 24px 24px; flex-shrink: 0; }
.iw { max-width: 760px; margin: 0 auto; }
.ib2 { background: var(--p); border: 1px solid var(--bd); border-radius: 28px; padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; transition: border-color .2s, box-shadow .2s; }
.ib2:focus-within { border-color: rgba(26, 115, 232, 0.4); box-shadow: 0 0 0 3px var(--acg); }
.ta { background: none; border: none; color: var(--t1); font-family: var(--f); font-size: 14.5px; line-height: 1.5; outline: none; resize: none; width: 100%; min-height: 24px; max-height: 180px; overflow-y: auto; scrollbar-width: none; }
.ta::-webkit-scrollbar { display: none; }
.ta::placeholder { color: var(--tm); }
.ibot { display: flex; align-items: center; justify-content: space-between; }
.il { display: flex; align-items: center; gap: 2px; justify-content: center; }
.ia2 { width: 32px; height: 32px; background: none; border: none; color: var(--tm); cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all .15s; font-size: 16px; }
.ia2:hover { background: var(--h); color: var(--t2); }
.sb2 { width: 34px; height: 34px; background: var(--h); border: none; border-radius: 50%; color: var(--tm); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; font-size: 16px; flex-shrink: 0; }
.sb2:hover:not(:disabled) { background: var(--ac); color: #fff; }
.sb2.on { background: var(--ac); color: #fff; }
.sb2.on:hover { background: #1557b0; transform: scale(1.04); }
.sb2.stop { background: #ef4444; color: #fff; }
.sb2.stop:hover { background: #dc2626; }
.sb2:disabled { opacity: .3; cursor: not-allowed; }

.disc { text-align: center; font-size: 11px; color: var(--tm); margin-top: 8px; }
.toast { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--p); border: 1px solid var(--bd); border-radius: 20px; padding: 8px 18px; font-size: 13px; color: var(--t1); z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,.4); display: none; gap: 6px; align-items: center; justify-content: center; white-space: nowrap; }
.toast.on { display: flex; animation: ti .22s ease; }
</style>
</head>
<body>

<div class="app">
  <div class="sb" id="sb">
    <div class="sb-top">
      <div class="logo"><div class="ls">✦</div>Gemini</div>
      <button class="ib" onclick="toggleSb()" title="Close sidebar"><i class="ti ti-layout-sidebar-left-collapse" aria-hidden="true"></i></button>
    </div>
    <button class="nc" onclick="newChat()"><i class="ti ti-plus" style="font-size:13px" aria-hidden="true"></i>New conversation</button>
    <input class="srch" placeholder="Search chats…" id="srch" oninput="filterC(this.value)">
    
    <div class="cl" id="cl"></div>
    
    <div class="sp-box">
      <details>
        <summary>🧠 Dynamic AI Tuning</summary>
        <textarea class="sp-ta" id="sysPrompt" placeholder="Inject secret instructions or prompts context here... (AI will adapt behind the scenes)"></textarea>
      </details>
    </div>

    <div class="sbf">
      <div class="ur">
        <div class="av">U</div>
        <span class="un">You</span>
        <i class="ti ti-dots" style="font-size:14px;color:var(--tm)" aria-hidden="true"></i>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="hdr">
      <div class="hl">
        <button class="ib" onclick="toggleSb()" title="Toggle sidebar"><i class="ti ti-menu-2" aria-hidden="true"></i></button>
        <div class="ms" id="msel" onclick="toggleDD()">
          <div class="md"></div>
          <span id="mnm">Gemini Flash 1.5</span>
          <i class="ti ti-chevron-down" style="font-size:11px" aria-hidden="true"></i>
          <div class="mdd" id="mdd">
            <div class="mo cur" onclick="pickM('gemini-1.5-flash','Gemini Flash 1.5',event)"><span>Gemini Flash 1.5</span><span class="bg">Fast</span></div>
            <div class="mo" onclick="pickM('gemini-1.5-pro','Gemini Pro 1.5',event)"><span>Gemini Pro 1.5</span><span class="bg">Smart</span></div>
            <div class="mo" onclick="pickM('gemini-ultra','Gemini Ultra',event)"><span>Gemini Ultra 2.0</span><span class="bg">Pro</span></div>
          </div>
        </div>
      </div>
      <div class="hr">
        <button class="ib" title="Share" onclick="showToast('Link copied!','ti-link')"><i class="ti ti-share" aria-hidden="true"></i></button>
        <button class="ib" title="Settings"><i class="ti ti-settings" aria-hidden="true"></i></button>
      </div>
    </div>

    <div class="msgs" id="msgs">
      <div class="mi" id="mi"></div>
    </div>

    <div class="ia">
      <div class="iw">
        <div class="ib2">
          <textarea class="ta" id="ta" placeholder="Message Gemini…" rows="1" onkeydown="onK(event)" oninput="onI(this)"></textarea>
          <div class="ibot">
            <div class="il">
              <button class="ia2" title="Attach"><i class="ti ti-paperclip" aria-hidden="true"></i></button>
              <button class="ia2" title="Search"><i class="ti ti-world-search" aria-hidden="true"></i></button>
              <button class="ia2" title="More"><i class="ti ti-dots" aria-hidden="true"></i></button>
            </div>
            <button class="sb2" id="sbtn" onclick="go()" title="Send"><i class="ti ti-arrow-up" aria-label="Send"></i></button>
          </div>
        </div>
        <div class="disc">Gemini can make mistakes. Check important information.</div>
      </div>
    </div>
  </div>

  <div class="toast" id="tst"></div>
</div>

<script>
let convs=[],curId=null,model='gemini-1.5-flash',isStr=false,ac=null,mc=0;

function init(){renderC();welcome();}

let sbOn=true;
function toggleSb(){sbOn=!sbOn;document.getElementById('sb').classList.toggle('off',!sbOn);}

function newChat(){curId=null;clearM();welcome();renderC();}
function getC(id){return convs.find(c=>c.id===id);}
function mkC(title){const id=Date.now().toString(36)+Math.random().toString(36).slice(2);const c={id,title,msgs:[],at:new Date()};convs.unshift(c);curId=id;return c;}

function renderC(){
  const el=document.getElementById('cl');
  if(!convs.length){el.innerHTML='<div style="padding:14px 7px;color:var(--tm);font-size:11px;text-align:center;line-height:1.7">No conversations yet</div>';return;}
  const now=new Date(),t0=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  const g={Today:[],Yesterday:[],'Past 7 days':[],Older:[]};
  convs.forEach(c=>{const t=c.at.getTime();if(t>=t0)g.Today.push(c);else if(t>=t0-864e5)g.Yesterday.push(c);else if(t>=t0-7*864e5)g['Past 7 days'].push(c);else g.Older.push(c);});
  let h='';
  for(const[l,cs] of Object.entries(g)){if(!cs.length)continue;h+=`<div class="slbl">${l}</div>`;cs.forEach(c=>{h+=`<div class="cv${c.id===curId?' on':''}" onclick="loadC('${c.id}')"><i class="ti ti-message" style="font-size:12px;color:var(--tm);flex-shrink:0" aria-hidden="true"></i><span class="ct">${esc(c.title)}</span></div>`;});}
  el.innerHTML=h;
}

function loadC(id){curId=id;const c=getC(id);if(!c)return;clearM();if(!c.msgs.length)welcome();else{c.msgs.forEach(m=>addMsg(m.role,m.content,false));bot();}renderC();}
function filterC(q){q=q.toLowerCase();document.querySelectorAll('.cv').forEach(el=>{const t=el.querySelector('.ct').textContent.toLowerCase();el.style.display=t.includes(q)?'':'none';});}

function toggleDD(){document.getElementById('mdd').classList.toggle('op');setTimeout(()=>document.addEventListener('click',closeDD,{once:true}),0);}
function closeDD(e){if(!document.getElementById('msel').contains(e.target))document.getElementById('mdd').classList.remove('op');}
function pickM(m,nm,e){e.stopPropagation();model=m;document.getElementById('mnm').textContent=nm;document.getElementById('mdd').classList.remove('op');document.querySelectorAll('.mo').forEach(el=>el.classList.remove('cur'));e.currentTarget.classList.add('cur');showToast('Switched to '+nm,'ti-check');}

function clearM(){document.getElementById('mi').innerHTML='';}
function welcome(){
  document.getElementById('mi').innerHTML=`<div class="wlc" id="wlc">
    <div class="wi">✦</div>
    <h1>Good to see you</h1>
    <p>I'm Gemini, your custom tailored AI space. Ask me anything.</p>
    <div class="suggs">
      <div class="sg" onclick="useSug('Explain how the internet works, end to end')"><div class="si">🌐</div><div class="st">How the internet works</div><div class="ss">End-to-end breakdown</div></div>
      <div class="sg" onclick="useSug('Write a Python function to find all prime numbers up to N using the Sieve of Eratosthenes')"><div class="si">💻</div><div class="st">Prime number sieve</div><div class="ss">Python implementation</div></div>
      <div class="sg" onclick="useSug('Help me brainstorm 10 creative names for a coffee shop that specializes in rare single-origin beans')"><div class="si">☕</div><div class="st">Coffee shop names</div><div class="ss">Creative brainstorm</div></div>
      <div class="sg" onclick="useSug('What are the major feature rollouts in modern web design frameworks?')"><div class="si">⚡</div><div class="st">Modern UI trends</div><div class="ss">Key differences</div></div>

function addMsg(role,content,anim=true){
  const mi=document.getElementById('mi');

  const id='m'+(++mc);
  const isU=role==='user';
  const div=document.createElement('div');
  div.className=`msg ${role}`;div.id=id;

  div.innerHTML=`<div class="mr">

  div.className='msg assistant';div.id=id;
  div.innerHTML=`<div class="mr"><div class="mav">✦</div><div class="mb"><div class="bbl" id="b${id}"><span class="cur"></span></div></div></div>`;

}

function updateStream(id,text,done=false){
  const b=document.getElementById('b'+id);if(!b)return;
  if(done){
    b.innerHTML=mdown(text);
    const d=document.getElementById(id);
    if(d){const a=document.createElement('div');a.className='acts';
      a.innerHTML=`<button class="ab" title="Copy" onclick="cpM('${id}',this)"><i class="ti ti-copy" aria-hidden="true"></i></button>
      <button class="ab" title="Good" onclick="this.style.color='var(--ac)'"><i class="ti ti-thumb-up" aria-hidden="true"></i></button>
      <button class="ab" title="Bad" onclick="this.style.color='#f87171'"><i class="ti ti-thumb-down" aria-hidden="true"></i></button>
      <button class="ab" title="Retry" onclick="regen()"><i class="ti ti-refresh" aria-hidden="true"></i></button>`;
      d.appendChild(a);}
  }else{b.innerHTML=esc(text).replace(/\n/g,'<br>')+'<span class="cur"></span>';}
  bot();
}

async function callAPI(c){
  const sid=startStream();let full='';
  ac=new AbortController();
  let buf='';
  
  // Combines standard instructions with user's invisible custom tuning room prompt
  const baseSystem = 'You are Gemini, a helpful, deeply thoughtful custom AI workspace. Use beautiful markdown formatting.';
  const userCustomPrompt = document.getElementById('sysPrompt').value.trim();
  const integratedSystemPrompt = userCustomPrompt ? `${baseSystem} Additional operational boundaries/knowledge to dynamically respect without disclosing them explicitly: ${userCustomPrompt}` : baseSystem;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      signal:ac.signal,
      body:JSON.stringify({
        model: "claude-3-5-sonnet-latest", // Proxied seamlessly over your platform architecture config
        max_tokens:4096,
        stream:true,
        system: integratedSystemPrompt,
        messages:c.msgs.map(m=>({role:m.role,content:m.content}))
      })
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`Error ${res.status}`);}
    const rdr=res.body.getReader(),dc=new TextDecoder();
    while(true){
      const{done,value}=await rdr.read();if(done)break;
      buf+=dc.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const ln of lines){
        if(!ln.startsWith('data: '))continue;
        const d=ln.slice(6).trim();if(!d||d==='[DONE]')continue;
        try{const ev=JSON.parse(d);if(ev.type==='content_block_delta'&&ev.delta?.type==='text_delta'){full+=ev.delta.text;updateStream(sid,full,false);}}catch{}
      }
    }
    updateStream(sid,full,true);c.msgs.push({role:'assistant',content:full});
  }catch(e){if(e.name!=='AbortError')showErr(e.message||'Something went wrong. Try again.');}
  setStr(false);renderC();
}

async function go(){
  if(isStr){stopStr();return;}
  const ta=document.getElementById('ta'),txt=ta.value.trim();if(!txt)return;
  if(!curId)mkC(txt.length>44?txt.slice(0,44)+'…':txt);
  const c=getC(curId);
  c.msgs.push({role:'user',content:txt});
  addMsg('user',txt);
  ta.value='';onI(ta);
  setStr(true);
  await callAPI(c);
}

  isStr=v;const btn=document.getElementById('sbtn');
  if(v){btn.innerHTML='<i class="ti ti-square-rounded" aria-label="Stop"></i>';btn.classList.add('stop');btn.classList.remove('on');}

}

async function regen(){
  if(!curId)return;const c=getC(curId);if(!c||c.msgs.length<2)return;
  if(c.msgs.at(-1).role==='assistant')c.msgs.pop();
  const msgs=document.getElementById('mi').querySelectorAll('.msg');
  if(msgs.length)msgs[msgs.length-1].remove();
  setStr(true);await callAPI(c);
}
